<!DOCTYPE html>
<html>
<head>
<title>My AI Assistant</title>

<style>
body {
    background: #111;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
}

.container {
    width: 600px;
    max-width: 90%;
    margin: 40px auto;
}

h1 {
    text-align: center;
}

#chat {
    background: #222;
    height: 450px;
    padding: 15px;
    border-radius: 12px;
    overflow-y: auto;
}

.message {
    padding: 12px;
    margin: 10px 0;
    border-radius: 10px;
}

.user {
    background: #0066ff;
    text-align: right;
}

.ai {
    background: #333;
}

.input-box {
    display: flex;
    margin-top: 15px;
}

input {
    flex: 1;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
}

button {
    margin-left: 10px;
    padding: 12px 20px;
    background: #00aaff;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #0088cc;
}
</style>

</head>


<body>

<div class="container">

<h1>🤖 My AI Assistant</h1>

<div id="chat">
    <div class="message ai">
        Hello! I am your AI assistant. Ask me anything!
    </div>
</div>

<div class="input-box">
    <input id="input" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
</div>

</div>


<script>

async function sendMessage() {

    let input = document.getElementById("input");
    let message = input.value;

    if (message === "") return;

    let chat = document.getElementById("chat");

    chat.innerHTML += `
    <div class="message user">
        ${message}
    </div>
    `;

    input.value = "";

    chat.innerHTML += `
    <div class="message ai">
        Thinking...
    </div>
    `;

    chat.scrollTop = chat.scrollHeight;


    let response = await fetch("http://localhost:3000/chat", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            message: message
        })
    });


    let data = await response.json();


    chat.innerHTML += `
    <div class="message ai">
        ${data.reply}
    </div>
    `;

    chat.scrollTop = chat.scrollHeight;
}

</script>
</body>
</html>
